version: '3.8'

services:
  frio-mirror:
    build: .
    container_name: frio-mirror
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/tmp/.docker.xauth
      - ADB_HOST=${ADB_HOST:-}
      - ADB_PORT=${ADB_PORT:-5555}
      - ADB_PAIRING_CODE=${ADB_PAIRING_CODE:-}
      - ADB_PAIRING_PORT=${ADB_PAIRING_PORT:-}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/bus/usb:/dev/bus/usb
    devices:
      - /dev/bus/usb
    stdin_open: true
    tty: true
